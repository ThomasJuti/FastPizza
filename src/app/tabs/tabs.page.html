<ion-tabs>
  <ion-tab-bar slot="bottom" class="custom-tab-bar">
    <ion-tab-button tab="menu" layout="icon-only">
      <div class="icon-container">
        <ion-icon name="home-outline"></ion-icon>
      </div>
    </ion-tab-button>

    <ion-tab-button tab="cart" layout="icon-only">
      <div class="icon-container">
        <ion-icon name="bag-handle-outline"></ion-icon>
        @if (cartService.itemCount > 0) {
        <ion-badge class="tab-badge">{{ cartService.itemCount }}</ion-badge>
        }
      </div>
    </ion-tab-button>

    <ion-tab-button tab="my-orders" layout="icon-only">
      <div class="icon-container">
        <ion-icon name="receipt-outline"></ion-icon>
      </div>
    </ion-tab-button>

    <ion-tab-button tab="profile" layout="icon-only">
      <div class="icon-container">
        <ion-icon name="person-outline"></ion-icon>
      </div>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
